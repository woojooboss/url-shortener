<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Redirecting...</title>
<meta name="robots" content="noindex">
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f5f5f5; color: #333; }
  .box { text-align: center; padding: 2rem; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
  a { color: #CAAA44; }
</style>
</head>
<body>
<div class="box">
  <h2 id="msg">이동 중...</h2>
  <p id="sub"></p>
</div>
<script>
(async () => {
  const path = location.pathname.replace(/^\/+|\/+$/g, '').split('/').pop();
  const msg = document.getElementById('msg');
  const sub = document.getElementById('sub');

  if (!path) {
    msg.textContent = '404 Not Found';
    return;
  }

  try {
    const res = await fetch('/urls.json?t=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) throw new Error('urls.json load failed');
    const urls = await res.json();
    const target = urls[path];
    if (target) {
      location.replace(target);
    } else {
      msg.textContent = '단축 URL을 찾을 수 없습니다';
      sub.innerHTML = '<a href="/">홈으로</a>';
    }
  } catch (e) {
    msg.textContent = '오류가 발생했습니다';
    sub.textContent = e.message;
  }
})();
</script>
</body>
</html>
